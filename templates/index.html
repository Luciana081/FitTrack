<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracking Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Fitness Tracking Dashboard</h1>
    </header>
    <main>
        <section id="overview">
            <h2>Overview</h2>
            <p>Track your fitness progress here!</p>
        </section>
        <section id="workouts">
            <h2>Workout Log</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Workout Type</th>
                        <th>Duration</th>
                        <th>Calories Burned</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Workout entries will be populated here -->
                </tbody>
            </table>
        </section>
        <section id="goals">
            <h2>Goals</h2>
            <p>Set and track your fitness goals!</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 FitTrack. All rights reserved.</p>
    </footer>
</body>
</html>
