version: '3.8'
services:
  flask:
    build: .
    ports:
      - '5000:5000'
    depends_on:
      - db

  db:
    image: mysql:latest
    environment:
      MYSQL_DATABASE: flask_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    driver: local